<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Grand Sky Facility</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #002147; /* Matches Grand Sky main branding */
            --accent-blue: #0056b3;
            --text-gray: #555;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .thank-you-card {
            background: #ffffff;
            padding: 50px;
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0, 33, 71, 0.1);
            text-align: center;
            max-width: 500px;
            border-top: 5px solid var(--primary-blue);
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: #e8f0fe;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
        }

        .icon-circle svg {
            width: 40px;
            fill: var(--primary-blue);
        }

        h1 {
            color: var(--primary-blue);
            margin-bottom: 15px;
        }

        p {
            color: var(--text-gray);
            line-height: 1.6;
        }

        .timer-text {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #888;
        }

        .btn-home {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background-color: var(--primary-blue);
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-home:hover {
            background-color: var(--accent-blue);
        }
    </style>
</head>
<body>

    <div class="thank-you-card">
        <div class="icon-circle">
            <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        </div>
        <h1>Message Received!</h1>
        <p>Thank you for reaching out to <strong>Grand Sky Facility</strong>. One of our team members will get back to you shortly.</p>
        
        <a href="index.html" class="btn-home">Return Home Now</a>

        <p class="timer-text">Redirecting you to the home page in <span id="seconds">5</span> seconds...</p>
    </div>

    <script>
        // Redirect Logic
        let count = 5;
        const countdownDisplay = document.getElementById('seconds');
        
        const timer = setInterval(() => {
            count--;
            countdownDisplay.textContent = count;
            if (count <= 0) {
                clearInterval(timer);
                window.location.href = "index.html"; // Ensure this matches your home file name
            }
        }, 1000);
    </script>
</body>
</html>
